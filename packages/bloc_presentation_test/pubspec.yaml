name: bloc_presentation_test
description: >
  Testing utilities for bloc_presentation — mock, stub, and verify single-time presentation events
  emitted from Blocs and Cubits using BlocPresentationMixin. Provides MockPresentationCubit,
  MockPresentationBloc, and whenListenPresentation helpers.
version: 1.2.0
homepage: https://github.com/leancodepl/bloc_presentation/tree/master/packages/bloc_presentation_test
topics:
  - bloc
  - testing
  - cubit
  - state-management
  - side-effects

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  bloc: ^9.0.0
  bloc_presentation: ^1.1.0
  diff_match_patch: ^0.4.1
  flutter:
    sdk: flutter
  meta: ^1.9.1
  mocktail: ^1.0.0
  test: ^1.24.3

dev_dependencies:
  equatable: ^2.0.5
  leancode_lint: ">=5.0.0"
