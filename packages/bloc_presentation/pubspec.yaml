name: bloc_presentation
description: >
  Dispatch single-time side effects (navigation / snackbar / dialog) from Bloc or Cubit without polluting state.
version: 1.1.2+3
homepage: https://github.com/leancodepl/bloc_presentation/tree/master/packages/bloc_presentation
topics:
  - bloc
  - cubit
  - architecture
  - side-effects
  - navigation

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  nested: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  leancode_lint: '>=5.0.0'
  mocktail: ^1.0.0
